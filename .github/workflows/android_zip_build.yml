name: Build APK from ZIP

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Isse aap manually bhi build start kar sakte ho

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub repository se foodconnect.zip ko fetch karna
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Zip file ko automatically extract/unzip karna
    - name: Unzip Project Files
      run: |
        echo "Extracting foodconnect.zip..."
        unzip -o foodconnect.zip -d .
        echo "Files extracted successfully!"
        ls -la # Extracted files ko verify karne ke liye

    # 3. Java Environment (JDK 17) setup karna
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 4. Gradle script (gradlew) ko execution permission dena
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # 5. Android Debug APK build karna
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 6. Build hone ke baad APK ko safe download link me convert karna (FIXED TYPO HERE)
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FoodConnect-APK
        path: app/build/outputs/apk/debug/app-debug.apk
