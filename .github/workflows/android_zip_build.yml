name: Build APK from ZIP

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Isse aap manually bhi build start kar sakte ho

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub repository se foodconnect.zip ko fetch karna
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. Zip file ko automatically extract/unzip karna
    - name: Unzip Project Files
      run: |
        echo "Extracting foodconnect.zip..."
        unzip -o foodconnect.zip -d .
        echo "Files extracted successfully!"
        ls -la # Extracted files ko check karne ke liye

    # 3. Java Environment (JDK 17) setup karna
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # 4. AGAR GRADLEW MISSING HAI TOH AUTOMATIC GENERATE KARNA
    - name: Generate Gradle Wrapper if missing
      run: |
        if [ ! -f gradlew ]; then
          echo "gradlew file nahi mili! Hum naya gradle wrapper generate kar rahe hain..."
          gradle wrapper
        else
          echo "gradlew file pehle se maujood hai."
        fi

    # 5. AUTOMATIC DEBUG KEYSTORE GENERATE KARNA (NEW FIX FOR SIGNING ERROR)
    - name: Generate Debug Keystore
      run: |
        echo "Temporary debug.keystore file generate ho rahi hai..."
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        # Isko app folder me bhi copy kar dete hain safe side ke liye
        cp debug.keystore app/debug.keystore || true
        echo "Keystore successfully generate ho gaya!"

    # 6. Gradle script (gradlew) ko execution permission dena
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # 7. Android Debug APK build karna
    - name: Build Debug APK
      run: ./gradlew assembleDebug

    # 8. Build hone ke baad APK ko safe download link me convert karna
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FoodConnect-APK
        path: app/build/outputs/apk/debug/app-debug.apk
